services:
  mcp:
    build: .
    command: python main.py --sse
    ports:
      - "5000:5000"
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./tokens:/app/tokens
    restart: always

  auth:
    build: .
    command: python auth_server.py
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      - OAUTHLIB_INSECURE_TRANSPORT=1
    volumes:
      - ./tokens:/app/tokens
    restart: always
    networks:
      - default
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.shopify-auth.rule=Host(`srv1534106.hstgr.cloud`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.shopify-auth.entrypoints=websecure"
      - "traefik.http.routers.shopify-auth.tls=true"
      - "traefik.http.services.shopify-auth.loadbalancer.server.port=5001"

networks:
  default:
  n8n_default:
    external: true
